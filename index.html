<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador de PDF</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #dcdcdc;
    }

    /* Barra superior estilo sistema */
    .topo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background-color: #e9e9e9;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      z-index: 1000;
    }

    .topo img {
      height: 25px;
    }

    /* Botões */
    .btn {
      width: 28px;
      height: 28px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .btn:hover {
      background: #ddd;
    }

    /* Área de controles */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
    }

    select, input {
      height: 28px;
    }

    /* Conteúdo */
    .conteudo {
      margin-top: 60px;
      padding-left: 20px;
    }

    iframe {
      width: 800px;
      height: 1000px;
      border: none;
      background: white;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <!-- TOPO -->
  <div class="topo">

    <!-- Logo -->
    <img src="rodape.png" alt="Rodapé">

    <!-- Botões -->
    <div class="controls">
      <div class="btn">⟵</div>
      <div class="btn">⟶</div>

      <span>Página</span>
      <input type="number" value="1" style="width: 50px;">
      <span>de 1</span>

      <div class="btn">🔍+</div>
      <div class="btn">🔍-</div>

      <select>
        <option>Image</option>
        <option>PDF</option>
      </select>
    </div>

  </div>

  <!-- PDF -->
  <div class="conteudo">
    <iframe src="arquivo.pdf"></iframe>
  </div>

</body>
</html>
